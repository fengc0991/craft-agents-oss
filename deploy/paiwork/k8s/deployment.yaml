apiVersion: v1
kind: Namespace
metadata:
  name: ${NAMESPACE}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: craft-agents-paiwork-data
  namespace: ${NAMESPACE}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: ${PVC_SIZE}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: craft-agents-paiwork
  namespace: ${NAMESPACE}
  labels:
    app: craft-agents-paiwork
spec:
  replicas: 1
  selector:
    matchLabels:
      app: craft-agents-paiwork
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: craft-agents-paiwork
    spec:
      securityContext:
        fsGroup: 10001
      initContainers:
        - name: seed-workspace
          image: ${IMAGE}
          imagePullPolicy: ${IMAGE_PULL_POLICY}
          securityContext:
            runAsUser: 0
            runAsGroup: 0
          command:
            - sh
            - -ec
            - |
              mkdir -p /home/craftagents/.craft-agent
              if [ ! -f /home/craftagents/.craft-agent/config.json ]; then
                cp -a /seed/.craft-agent/. /home/craftagents/.craft-agent/
              fi
              rm -f /home/craftagents/.craft-agent/.server.lock
              chown -R 10001:10001 /home/craftagents/.craft-agent
              chmod -R u+rwX,g+rwX /home/craftagents/.craft-agent
          volumeMounts:
            - name: craft-agent-data
              mountPath: /home/craftagents/.craft-agent
        - name: init-runtime-secrets
          image: ${IMAGE}
          imagePullPolicy: ${IMAGE_PULL_POLICY}
          envFrom:
            - secretRef:
                name: craft-agents-paiwork-secret
                optional: true
          command:
            - sh
            - -ec
            - |
              if [ -n "$${RABYTE_LLM_API_KEY:-}" ]; then
                bun --eval "import { getCredentialManager } from './packages/shared/src/credentials/index.ts'; await getCredentialManager().setLlmApiKey('rabyte-llm', process.env.RABYTE_LLM_API_KEY);"
              fi
              if [ -n "$${SEALOS_LLM_API_KEY:-}" ]; then
                bun --eval "import { getCredentialManager } from './packages/shared/src/credentials/index.ts'; await getCredentialManager().setLlmApiKey('pi-api-key', process.env.SEALOS_LLM_API_KEY);"
              fi
              if [ -n "$${PAI_OBS_API_KEY:-}" ]; then
                install -d -m 700 /home/craftagents/.craft-agent/workspaces/paiwork/skills/paiwork-observability
                {
                  printf 'PAI_OBS_API_KEY=%s\n' "$$PAI_OBS_API_KEY"
                  printf 'PAI_OBS_BASE_URL=%s\n' "$${PAI_OBS_BASE_URL:-http://192.168.15.57:30100}"
                } > /home/craftagents/.craft-agent/workspaces/paiwork/skills/paiwork-observability/.paiobs.env
                chmod 600 /home/craftagents/.craft-agent/workspaces/paiwork/skills/paiwork-observability/.paiobs.env
              fi
          volumeMounts:
            - name: craft-agent-data
              mountPath: /home/craftagents/.craft-agent
      containers:
        - name: webui
          image: ${IMAGE}
          imagePullPolicy: ${IMAGE_PULL_POLICY}
          args:
            - --allow-insecure-bind
          ports:
            - name: http
              containerPort: 9100
          env:
            - name: HOME
              value: /home/craftagents
            - name: CRAFT_RPC_HOST
              value: 0.0.0.0
            - name: CRAFT_RPC_PORT
              value: "9100"
            - name: CRAFT_WEBUI_DIR
              value: /app/apps/webui/dist
            - name: CRAFT_BUNDLED_ASSETS_ROOT
              value: /app/apps/electron
            - name: CRAFT_WEBUI_SECURE_COOKIE
              value: "false"
            - name: CRAFT_SERVER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: craft-agents-paiwork-secret
                  key: CRAFT_SERVER_TOKEN
            - name: CRAFT_WEBUI_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: craft-agents-paiwork-secret
                  key: CRAFT_WEBUI_PASSWORD
                  optional: true
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 45
            periodSeconds: 20
            timeoutSeconds: 5
          resources:
            requests:
              cpu: ${CPU_REQUEST}
              memory: ${MEMORY_REQUEST}
            limits:
              cpu: ${CPU_LIMIT}
              memory: ${MEMORY_LIMIT}
          volumeMounts:
            - name: craft-agent-data
              mountPath: /home/craftagents/.craft-agent
      volumes:
        - name: craft-agent-data
          persistentVolumeClaim:
            claimName: craft-agents-paiwork-data
---
apiVersion: v1
kind: Service
metadata:
  name: craft-agents-paiwork
  namespace: ${NAMESPACE}
  labels:
    app: craft-agents-paiwork
spec:
  type: NodePort
  selector:
    app: craft-agents-paiwork
  ports:
    - name: http
      port: 9100
      targetPort: http
      nodePort: ${NODE_PORT}
